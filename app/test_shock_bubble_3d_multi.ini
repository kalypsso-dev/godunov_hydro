# reference:
# Triangular metric-based mesh adaptation for compressible multi-material flows in semi-Lagrangian coordinates
# Stéphane Del Pino and Isabelle Marmajou
# Journal of Computational Physics, Volume 478, 1 April 2023, 111975
# https://doi.org/10.1016/j.jcp.2023.111975
#
# see section 4.5

[run]
dimension=3
tEnd=3.0
nStepmax=10000

# noutput equals -1 means we dump data at every time steps
nOutput=40

[amr]
level_min=1
level_max=4

use_block_data=yes
bx=8
by=8
bz=8

# amr refine criterion use at init condition
# possible value: ALWAYS_REFINE, GEOMETRIC, SAME_AS_REGULAR_DYNAMICS
#refine_criterion_at_init=GEOMETRIC
refine_criterion_at_init=SAME_AS_REGULAR_DYNAMICS

# init step may contain calls to globalRefine
# if the following option is true, we interleave
# calls to load balancing in between globalRefine
# if the following option is false, a single load
# balancing operation is done at the end of
# globalRefine steps
enable_load_balance_during_init=false

# refine criterion (used during regular dynamics)
# example parameter for using LOHNER_UNSPLIT criterion
refine_criterion=LOHNER_UNSPLIT
epsilon_refine=0.1
epsilon_coarsen=0.125
epsilon_lohner=0.02

# example parameter for using LOHNER_UNSPLIT criterion
#refine_criterion=SIMPLE_GRADIENT
#epsilon_refine=0.1
#epsilon_coarsen=0.01

# p4est connectivity type
connectivity=brick

# control MPI load balancing (number of time steps between two
# consecutive load balancing)
load_balancing_frequency=20

# control AMR cycle frequency (number of time steps between two
# consecutive AMR cycles)
cycle_frequency=10

#
# when using two AMR refinement criterion (one for init conditions,
# one of the rest of the simulation run), we may want to disable the first amr cycle
# to smooth the transition between the two AMR criterion.
#
disable_first_amr_cycle=yes

variable_used_to_compute_refine_criterion=rho

[p4est_connectivity]
nbrick_x=1
nbrick_y=1
nbrick_z=1

periodic_x=0
periodic_y=0
periodic_z=0

[mesh]
xmin=0.0
ymin=0.0
zmin=0.0

scaling_factor=10.0

boundary_type_xmin=ZERO_GRADIENT
boundary_type_xmax=ZERO_GRADIENT

boundary_type_ymin=WALL
boundary_type_ymax=WALL

boundary_type_zmin=WALL
boundary_type_zmax=WALL

[hydro]
cfl=0.8
niter_riemann=10
slope_type=2
problem=shock_bubble
riemann=HLLC
implementation_version=0

[shock_bubble]
num_bubbles=6
x_front=0.5
bubble_x=3.0, 3.5, 4.0, 5.0, 5.3, 6.3
bubble_y=5.0, 7.1, 2.8, 5.0, 6.3, 3.6
bubble_z=5.0, 5.0, 5.0, 5.0, 5.0, 5.0
bubble_radius=1.0, 0.5, 0.7, 0.2, 0.8, 0.9

[material0]
name="air"
gamma=1.4

# air - post-shock
[region0]
name=post-shock
rho=3.81
p=10.0
u=2.85
v=0.0
w=0.0

# air - pre-shock
[region1]
name=pre-shock
rho=1.0
p=1.0
u=0.0
v=0.0
w=0.0

# air - bubble
[region2]
name=bubble0
rho=0.1
p=1.0
u=0.0
v=0.0
w=0.0

# air - bubble
[region3]
name=bubble1
rho=0.1
p=1.0
u=0.0
v=0.0
w=0.0

# air - bubble
[region4]
name=bubble2
rho=0.1
p=1.0
u=0.0
v=0.0
w=0.0

# air - bubble
[region5]
name=bubble3
rho=0.1
p=1.0
u=0.0
v=0.0
w=0.0

# air - bubble
[region6]
name=bubble4
rho=0.1
p=1.0
u=0.0
v=0.0
w=0.0

# air - bubble
[region7]
name=bubble5
rho=0.1
p=1.0
u=0.0
v=0.0
w=0.0

[output]
outputDir=./
outputPrefix=test_shock_bubble_3d_multi
outputVtkAscii=false
write_variables=rho,rho_schlieren,thermal_pressure
write_mesh_info=yes
write_iOct=no
hdf5_enabled=yes
enable_writing_leaf_data=no
write_conformal_status=no
schlieren_scaling=SQRT
