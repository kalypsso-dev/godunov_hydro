[run]
dimension=2

# tEnd is 0.9 * Tshock
# with Tshock = 1/((gamma+1) * pi * alpha * c0)
# and c0 = sqrt(gamma*p0/rho0)
# see below section breaking_wave for default values of rho0, p0 and alpha
tEnd=2.631476704163657e-05
nStepmax=20000

# noutput equals -1 means we dump data at every time steps
nOutput=10

[amr]
level_min=2
level_max=5

use_block_data=yes
bx=16
by=16

# init step may contain calls to globalRefine
# if the following option is true, we interleave
# calls to load balancing in between globalRefine
# if the following option is false, a single load
# balancing operation is done at the end of
# globalRefine steps
enable_load_balance_during_init=false

# amr refine criterion use at init condition
# possible value: ALWAYS_REFINE, GEOMETRIC, SAME_AS_REGULAR_DYNAMICS
refine_criterion_at_init=ALWAYS_REFINE

# example parameter for using LOHNER_UNSPLIT criterion
refine_criterion=LOHNER_UNSPLIT
epsilon_refine=0.002
epsilon_coarsen=0.00025
epsilon_lohner=0.02

# example parameter for using LOHNER_UNSPLIT criterion
#refine_criterion=SIMPLE_GRADIENT
#epsilon_refine=0.001
#epsilon_coarsen=0.0005

# p4est connectivity type
connectivity=brick

# control MPI load balancing (number of time steps between two
# consecutive load balancing)
load_balancing_frequency=10

# control AMR cycle frequency (number of time steps between two
# consecutive AMR cycles)
cycle_frequency=5

[p4est_connectivity]
nbrick_x=8
nbrick_y=1

periodic_x=1
periodic_y=1

[mesh]
xmin=-0.5
ymin=-0.5

# scaling factor chosen such that scaling_factor * nbrick_x = 1
# i.e. the domain is the unit square
scaling_factor=0.125

boundary_type_xmin=WALL
boundary_type_xmax=WALL

boundary_type_ymin=WALL
boundary_type_ymax=WALL

[hydro]
cfl=0.8
niter_riemann=10
slope_type=2
problem=breaking_wave
riemann=HLLC
implementation_version=0

[breaking_wave]
rho0=1e-3
p0=1e6
alpha=0.1

[material0]
gamma=1.666

[output]
outputDir=./
outputPrefix=test_breaking_wave_2d
outputVtkAscii=false
write_variables=rho,rho_vx,rho_vy,e_tot
write_mesh_info=yes
write_iOct=no
hdf5_enabled=yes
enable_writing_leaf_data=no
write_conformal_status=no
